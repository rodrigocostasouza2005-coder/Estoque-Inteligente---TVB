        </table>
      </div>
    </div>`;
}
function viewHistoricoCharts() {
  const h = State.raw.historico; if (!h.length) return;
  const render = () => {
    const sel = document.querySelector('[data-hist-loja]');
    const lojaFiltro = sel ? sel.value : 'all';
    const dados = lojaFiltro === 'all' ? h : h.filter(x => x.loja === lojaFiltro);
    const meses = [...new Set(dados.map(x => x.mes))];
    const totFam = {};
    dados.forEach(x => totFam[x.familia] = (totFam[x.familia]||0) + x.receita);
    const topFam = Object.entries(totFam).sort((a,b) => b[1]-a[1]).slice(0,8).map(x => x[0]);
    const colors = ['#18181b','#059669','#4f46e5','#d97706','#dc2626','#8b5cf6','#0891b2','#84cc16'];
    const datasets = topFam.map((f, i) => ({
      label: f,
      data: meses.map(m => sum(dados.filter(x => x.familia===f && x.mes===m), x => x.receita)),
      backgroundColor: colors[i] + 'e6',
      stack: 'a'
    }));
    chart('histChart', {
      type:'bar',
      data: { labels: meses, datasets },
      options: { plugins:{ legend:{ position:'bottom' } }, scales:{ x:{ stacked:true }, y:{ stacked:true, ticks:{ callback: v => 'R$'+(v/1000).toFixed(0)+'k' } } } }
    });
  };
  render();
  const sel = document.querySelector('[data-hist-loja]');
  if (sel) sel.onchange = render;
  renderHistTable();
  attachSortable('#hist-table', renderHistTable);
  const search = document.querySelector('[data-hist-search]');
  if (search) search.oninput = renderHistTable;
}
function renderHistTable() {
  const tbody = document.getElementById('hist-tbody'); if (!tbody) return;
  const q = (document.querySelector('[data-hist-search]')?.value || '').toLowerCase().trim();
  const meses = State._histMeses || [];
  let rows = State._histAllRows || [];
  if (q) rows = rows.filter(r => (r.familia||'').toLowerCase().includes(q));
  rows = applySort(rows, '#hist-table');
  tbody.innerHTML = rows.map(r => {
    const tds = meses.map(m => `<td class="num">${r[m] ? fmtBRL(r[m]) : '—'}</td>`).join('');
    return `<tr><td class="strong">${r.familia}</td>${tds}<td class="num strong">${fmtBRL(r._total)}</td></tr>`;
  }).join('') || `<tr><td colspan="${meses.length+2}" class="empty">Nenhuma família corresponde</td></tr>`;
}

/* ============== REGRAS (editar thresholds) ============== */
function viewRegras() {
  const r = State.rules;
  const row = (key, label, help, suffix='') => `
    <div style="display:grid;grid-template-columns:1fr 120px;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid #f4f4f5">
      <div>
        <div style="font-weight:600;color:#18181b;font-size:13px">${label}</div>
        <div style="font-size:12px;color:#71717a;margin-top:2px">${help}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="number" step="${key==='abcA'||key==='abcB'||key.startsWith('giro')?'0.1':'1'}" data-rule="${key}" value="${r[key]}"
          style="width:80px;padding:7px 10px;border:1px solid #e4e4e7;border-radius:7px;font-size:13px;font-family:inherit;text-align:right">
        <span style="font-size:12px;color:#71717a;min-width:28px">${suffix}</span>
      </div>
    </div>`;

  return `
    <div class="intro">
      <div><h2>Regras de análise</h2>
      <p>Edite os parâmetros aqui e a ferramenta recalcula tudo na hora. Todas as regras aqui foram co-definidas com você — mude à vontade, é assim que vamos afinar.</p></div>
      <div class="actions">
        <button class="btn" id="rulesReset">Restaurar padrão</button>
        <button class="btn primary" id="rulesSave">Aplicar</button>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-head"><h3>Curva ABC</h3></div>
        <div style="background:#fafafa;border:1px solid #f4f4f5;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#52525b">
          A TVB usa <strong>50/30/20</strong> (A = 50% do faturamento, B = 30%, C = 20% restantes). Os campos abaixo são os <em>cortes acumulados</em>: abcA=50 significa "A vai até 50%"; abcB=80 significa "B vai até 80% (50+30)".
        </div>
        ${row('abcA','Classe A — corte acumulado (até X%)','A TVB: 50%.','%')}
        ${row('abcB','Classe B — corte acumulado (até X%)','A TVB: 80% (= 50% da A + 30% da B).','%')}
        <div style="display:grid;grid-template-columns:1fr 140px;gap:12px;align-items:center;padding:10px 0;border-top:1px solid #f4f4f5;margin-top:8px">
          <div>
            <div style="font-weight:600;color:#18181b;font-size:13px">Nível de agregação da ABC</div>
            <div style="font-size:12px;color:#71717a;margin-top:2px">Por qual nível a curva deve classificar os produtos. Padrão: por referência (modelo).</div>
          </div>
          <select data-rule="abcNivel" style="padding:7px 10px;border:1px solid #e4e4e7;border-radius:7px;font-size:12px;font-family:inherit">
            <option value="referencia" ${r.abcNivel==='referencia'?'selected':''}>Por referência (modelo)</option>
            <option value="codVendas" ${r.abcNivel==='codVendas'?'selected':''}>Por modelo + cor</option>
            <option value="barcode" ${r.abcNivel==='barcode'?'selected':''}>Por SKU (modelo+cor+tam)</option>
          </select>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Envelhecimento</h3></div>
        ${row('envAlerta','Dias pra entrar em ALERTA','Produto sem venda por esse tempo começa a aparecer no radar.','d')}
        ${row('envPromo','Dias pra sugerir PROMOÇÃO','Acima disso, o sistema já recomenda aplicar desconto.','d')}
        ${row('envQueima','Dias pra ir pra QUEIMA/OUTLET','Acima disso, sugere remover da loja.','d')}
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-head"><h3>Cobertura de estoque</h3></div>
        ${row('cobBaixa','Cobertura BAIXA (abaixo de)','Abaixo desse valor é risco de ruptura.','d')}
        ${row('cobAlta','Cobertura EXCESSIVA (acima de)','Acima = capital parado demais.','d')}
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Giro</h3></div>
        ${row('giroAlto','Giro ALTO (≥)','Giro anualizado a partir desse valor.','x')}
        ${row('giroBaixo','Giro BAIXO (≤)','Giro anualizado abaixo desse valor.','x')}
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-head"><h3>Ruptura</h3></div>
        ${row('rupturaDiasVenda','Ruptura real = estoque 0 + venda nos últimos X dias','Separa ruptura real de SKU antigo esgotado.','d')}
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Reabastecimento automático</h3></div>
        ${row('reabCobertura','Sugerir reabastecer quando cobertura < X','Abaixo desse limite o sistema alerta.','d')}
        ${row('reabGiroMin','...E giro for ≥ X','Só alerta se o SKU também estiver girando bem.','x')}
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><h3>Sugestões extras</h3></div>
      <div style="display:grid;grid-template-columns:1fr 120px;gap:12px;align-items:center;padding:10px 0">
        <div>
          <div style="font-weight:600;color:#18181b;font-size:13px">Sugerir transferência entre lojas</div>
          <div style="font-size:12px;color:#71717a;margin-top:2px">Desativado por padrão. Quando ligar, o sistema sugere mover produto de loja com excesso pra loja em ruptura.</div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" data-rule="sugestaoTransfAtiva" ${r.sugestaoTransfAtiva?'checked':''} style="width:18px;height:18px">
          <span style="font-size:12px;color:#71717a">Ativar</span>
        </label>
      </div>
    </div>
  `;
}
function viewRegrasCharts(){}

/* ============== DADOS (upload) ============== */
function viewDados() {
  const s = (arr) => Array.isArray(arr) ? arr.length : (arr ? 1 : 0);
  const linhas = {
    estoque: State.raw.estoque.length,
    vendas: State.raw.vendas.length,
    produtos: State.raw.produtos.length,
    ordens: State.raw.ordens.length,
    devolucoes: State.raw.devolucoes.length,
    historico: State.raw.historico.length
  };
  const snap = State.dataRefDate ? State.dataRefDate.toLocaleDateString('pt-BR') : '—';
  const slot = (kind, title, desc, multi=false) => {
    const count = linhas[kind];
    return `<div class="upload-slot ${count?'has-file':''}" data-kind="${kind}">
      <input type="file" accept=".xlsx,.xls,.csv" ${multi?'multiple':''}>
      <div class="u-head">
        <div>
          <div class="u-title">${title}</div>
          <div class="u-desc">${desc}</div>
        </div>
      </div>
      <div class="u-status ${count?'':'empty'}">${count ? fmtNum(count)+' linhas carregadas' : 'Clique ou arraste um arquivo'}</div>
    </div>`;
  };
  return `
    <div class="intro">
      <div><h2>Dados</h2>
      <p>Faça upload das planilhas do PowerBI. Snapshot atual: <strong>${snap}</strong>. Você pode subir novas versões a qualquer momento — cada upload substitui o anterior (exceto vendas, que consolida múltiplos arquivos).</p></div>
      <div class="actions">
        <button class="btn" id="loadFromFolder">Carregar tudo da pasta TVB</button>
      </div>
    </div>
    <h3 style="font-size:13px;color:#52525b;margin:18px 0 10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Obrigatórios</h3>
    <div class="upload-grid">
      ${slot('estoque','Estoque','ESTOQUE_POWER_BI.xlsx — quantidade por SKU em cada loja/CD')}
      ${slot('vendas','Vendas (consolidado)','VENDAS_PARA_BI.xlsx — linha-a-linha. Pode enviar múltiplos arquivos.',true)}
      ${slot('produtos','Produtos','Produtos DAPIC BI.xlsx — catálogo, bestseller flag')}
      ${slot('ordens','Ordem de Produção','ORDEM_PRODUÇAO.xlsx — quanto foi produzido por SKU+tamanho')}
    </div>
    <h3 style="font-size:13px;color:#52525b;margin:18px 0 10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Complementares</h3>
    <div class="upload-grid">
      ${slot('devolucoes','Devoluções','DEVOLUÇÃO_BI.xlsx — devoluções são subtraídas das vendas')}
      ${slot('historico','Histórico 2025 (por família)','Os arquivos "vendas 2025 leblon/rio sul por familia" — contexto histórico. Múltiplos arquivos.',true)}
    </div>
    <div class="panel" style="margin-top:18px">
      <div class="panel-head"><h3>Status</h3></div>
      <table>
        <thead><tr><th>Fonte</th><th class="num">Linhas</th><th>Status</th></tr></thead>
        <tbody>
          <tr><td>Estoque</td><td class="num">${fmtNum(linhas.estoque)}</td><td>${linhas.estoque?pill('OK','ok'):pill('VAZIO','neutral')}</td></tr>
          <tr><td>Vendas</td><td class="num">${fmtNum(linhas.vendas)}</td><td>${linhas.vendas?pill('OK','ok'):pill('VAZIO','neutral')}</td></tr>
          <tr><td>Produtos</td><td class="num">${fmtNum(linhas.produtos)}</td><td>${linhas.produtos?pill('OK','ok'):pill('VAZIO','neutral')}</td></tr>
          <tr><td>Ordem de Produção</td><td class="num">${fmtNum(linhas.ordens)}</td><td>${linhas.ordens?pill('OK','ok'):pill('VAZIO','neutral')}</td></tr>
          <tr><td>Devoluções</td><td class="num">${fmtNum(linhas.devolucoes)}</td><td>${linhas.devolucoes?pill('OK','ok'):pill('VAZIO','neutral')}</td></tr>
          <tr><td>Histórico 2025</td><td class="num">${fmtNum(linhas.historico)}</td><td>${linhas.historico?pill('OK','ok'):pill('VAZIO','neutral')}</td></tr>
        </tbody>
      </table>
    </div>`;
}
function viewDadosCharts(){}

/* ============================================================
 * DISPATCHER — escolhe qual view renderizar
 * ============================================================ */
const VIEWS = {
  overview: { title:'Visão Geral', sub:'Panorama do estoque e vendas', render: viewOverview, after: viewOverviewCharts },
  giro: { title:'Giro de Estoque', sub:'Quantas vezes o estoque gira no ano', render: viewGiro, after: viewGiroCharts },
  cobertura: { title:'Cobertura', sub:'Dias de estoque restante vs. velocidade de venda', render: viewCobertura, after: viewCoberturaCharts },
  sellthrough: { title:'Sell-through', sub:'Vendido ÷ Produzido (baseado em Ordem de Produção)', render: viewSellThrough, after: viewSellThroughCharts },
  abc: { title:'Curva ABC', sub:'Classificação A/B/C por receita acumulada', render: viewABC, after: viewABCCharts },
  envelhecimento: { title:'Envelhecimento', sub:'Tempo sem vender por SKU', render: viewEnvelhecimento, after: viewEnvelhecimentoCharts },
  ruptura: { title:'Ruptura', sub:'Estoque zero com demanda ativa', render: viewRuptura, after: viewRupturaCharts },
  sugestoes: { title:'Sugestões', sub:'Ações recomendadas a partir das regras', render: viewSugestoes, after: viewSugestoesCharts },
  historico: { title:'Histórico 2025', sub:'Relatórios agregados por família e mês', render: viewHistorico, after: viewHistoricoCharts },
  regras: { title:'Regras', sub:'Parâmetros editáveis — mude e tudo recalcula', render: viewRegras, after: viewRegrasCharts },
  dados: { title:'Dados', sub:'Upload das planilhas do PowerBI', render: viewDados, after: viewDadosCharts }
};

function goto(view) {
  State.currentView = view;
  $$('aside nav button').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  render();
}

function render() {
  const v = VIEWS[State.currentView] || VIEWS.overview;
  $('#view-title').textContent = v.title;
  $('#view-sub').textContent = v.sub;
  $('#content').innerHTML = v.render();
  // Charts precisam ser construídos DEPOIS do innerHTML (os canvas já existem)
  requestAnimationFrame(() => { try { v.after(); } catch(e) { console.error(e); } });
  // Ligar handlers específicos da view
  attachViewHandlers();
}

function attachViewHandlers() {
  // Uploads (na aba Dados)
  $$('#content .upload-slot').forEach(slot => {
    const inp = slot.querySelector('input[type=file]');
    if (!inp) return;
    inp.onchange = async (e) => {
      const files = [...e.target.files];
      if (!files.length) return;
      await handleUploads(slot.dataset.kind, files);
    };
    slot.ondragover = e => { e.preventDefault(); slot.classList.add('dragover'); };
    slot.ondragleave = () => slot.classList.remove('dragover');
    slot.ondrop = async (e) => {
      e.preventDefault(); slot.classList.remove('dragover');
      const files = [...e.dataTransfer.files];
      if (files.length) await handleUploads(slot.dataset.kind, files);
    };
  });
  const loadFolder = $('#loadFromFolder');
  if (loadFolder) loadFolder.onclick = () => toast('Arraste os arquivos para os slots acima. Upload direto da pasta só funciona no navegador do usuário.');

  // Regras — inputs, selects e botões
  $$('#content input[data-rule], #content select[data-rule]').forEach(inp => {
    inp.onchange = () => {
      const k = inp.dataset.rule;
      if (inp.type === 'checkbox') State.rules[k] = inp.checked;
      else if (inp.tagName === 'SELECT') State.rules[k] = inp.value;
      else State.rules[k] = parseFloat(inp.value);
    };
  });
  const rSave = $('#rulesSave');
  if (rSave) rSave.onclick = () => { render(); toast('Regras aplicadas — mudanças refletem em todas as abas.'); };
  const rReset = $('#rulesReset');
  if (rReset) rReset.onclick = () => {
    if (!confirm('Restaurar valores padrão?')) return;
    State.rules = { ...DEFAULT_RULES };
    render();
    toast('Regras restauradas para o padrão.');
  };
}

async function handleUploads(kind, files) {
  try {
    if (kind === 'vendas') {
      // append
      for (const f of files) {
        const rows = await parseVendas(f);
        State.raw.vendas = State.raw.vendas.concat(rows);
      }
    } else if (kind === 'historico') {
      for (const f of files) {
        const lojaGuess = f.name.toLowerCase().includes('leblon') ? 'TVB Leblon' :
                          f.name.toLowerCase().includes('rio sul') ? 'TVB Rio Sul' : f.name;
        const rows = await parseHistoricoFamilia(f, lojaGuess);
        State.raw.historico = State.raw.historico.concat(rows);
      }
    } else if (kind === 'estoque') {
      State.raw.estoque = await parseEstoque(files[0]);
    } else if (kind === 'produtos') {
      State.raw.produtos = await parseProdutos(files[0]);
    } else if (kind === 'ordens') {
      State.raw.ordens = await parseOrdens(files[0]);
    } else if (kind === 'devolucoes') {
      State.raw.devolucoes = await parseDevolucoes(files[0]);
    }
    computeItems();
    populateFilters();
    render();
    updateFootStatus();
    toast(`${kind} carregado com sucesso.`);
  } catch (e) {
    console.error(e);
    toast('Erro ao ler arquivo: ' + e.message, true);
  }
}

/* ============== FILTERS ============== */
function populateFilters() {
  const empresas = [...new Set(State.items.map(i => i.empresa).filter(Boolean))].sort();
  const grupos = [...new Set(State.items.map(i => i.grupo).filter(Boolean))].sort();
  const tams = [...new Set(State.items.map(i => i.tamanho).filter(Boolean))].sort();
  const arms = [...new Set(State.items.map(i => i.armazenador).filter(Boolean))].sort();
  const fill = (id, items, allLabel) => {
    const sel = $(id); const current = sel.value;
    sel.innerHTML = `<option value="all">${allLabel}</option>` + items.map(i => `<option value="${i}">${i}</option>`).join('');
    sel.value = items.includes(current) ? current : 'all';
  };
  fill('#filter-empresa', empresas, 'Todas as empresas');
  fill('#filter-grupo', grupos, 'Todas as categorias');
  fill('#filter-tamanho', tams, 'Todos os tamanhos');
  fill('#filter-armazenador', arms, 'Todos os locais');
}

function updateFootStatus() {
  const total = State.items.length;
  const snap = State.dataRefDate ? State.dataRefDate.toLocaleDateString('pt-BR') : '—';
  $('#foot-status').textContent = total ? `${fmtNum(total)} SKUs · Snapshot ${snap}` : 'Sem dados carregados';
}

/* ============== BOOTSTRAP ============== */
document.addEventListener('DOMContentLoaded', () => {
  // Nav
  $$('aside nav button').forEach(b => b.onclick = () => goto(b.dataset.view));
  // Filtros
  const filterIds = {
    '#filter-periodo': 'periodo', '#filter-empresa':'empresa', '#filter-grupo':'grupo',
    '#filter-tamanho':'tamanho', '#filter-armazenador':'armazenador'
  };
  Object.entries(filterIds).forEach(([sel, key]) => {
    $(sel).addEventListener('change', (e) => {
      const v = e.target.value;
      State.filters[key] = key === 'periodo' ? (v === 'all' ? 'all' : parseInt(v)) : v;
      render();
    });
  });
  // Render inicial
  render();
});
</script>
