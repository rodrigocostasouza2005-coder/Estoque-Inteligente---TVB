<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TVB — Estoque Inteligente</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#fafafa;color:#18181b;font-size:14px;line-height:1.5;display:flex}
  /* Sidebar */
  .sidebar{width:230px;background:#fff;border-right:1px solid #e4e4e7;height:100vh;display:flex;flex-direction:column;position:sticky;top:0;flex-shrink:0}
  .brand{padding:20px 18px;border-bottom:1px solid #e4e4e7;display:flex;align-items:center;gap:10px}
  .logo-box{width:40px;height:40px;background:#fff;color:#18181b;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;border-radius:8px;letter-spacing:-0.5px;border:1px solid #e4e4e7;padding:3px;object-fit:contain}
  .brand-name{line-height:1.1}
  .brand-name strong{font-weight:700;font-size:15px;display:block}
  .brand-sub{font-size:10.5px;color:#71717a;text-transform:uppercase;letter-spacing:0.8px;margin-top:2px}
  nav{padding:12px 10px;flex:1;overflow-y:auto}
  nav .nav-section{font-size:10px;color:#a1a1aa;text-transform:uppercase;letter-spacing:1px;padding:10px 10px 6px;font-weight:600}
  nav button{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border:0;background:transparent;color:#52525b;text-align:left;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;margin-bottom:1px;font-family:inherit}
  nav button:hover{background:#f4f4f5;color:#18181b}
  nav button.active{background:#18181b;color:#fff}
  nav button .icon{width:14px;display:inline-block;text-align:center;opacity:0.7}
  nav button.active .icon{opacity:1}
  .sidebar-foot{padding:12px 14px;border-top:1px solid #e4e4e7;font-size:11px;color:#a1a1aa}
  /* Main */
  main{flex:1;min-width:0;display:flex;flex-direction:column}
  header{background:#fff;border-bottom:1px solid #e4e4e7;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
  header h1{font-size:20px;font-weight:700;color:#18181b}
  header .subtitle{font-size:12px;color:#71717a;margin-top:2px}
  .filters{display:flex;gap:8px;flex-wrap:wrap}
  .filters select{padding:7px 10px;border:1px solid #e4e4e7;border-radius:7px;background:#fff;font-size:12.5px;color:#3f3f46;cursor:pointer;font-family:inherit;outline:none;min-width:140px}
  .filters select:focus{border-color:#18181b}
  .content{padding:24px 28px;flex:1}
  /* View system */
  .view{display:none}
  .view.active{display:block}
  /* Cards */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
  .kpi{background:#fff;border:1px solid #e4e4e7;border-radius:10px;padding:14px 16px}
  .kpi .label{font-size:10.5px;color:#71717a;text-transform:uppercase;letter-spacing:0.6px;font-weight:600}
  .kpi .value{font-size:24px;font-weight:700;margin-top:6px;color:#18181b;line-height:1.1}
  .kpi .hint{font-size:11px;color:#a1a1aa;margin-top:4px}
  .kpi.ok .value{color:#059669}
  .kpi.warn .value{color:#d97706}
  .kpi.bad .value{color:#dc2626}
  .kpi.info .value{color:#4f46e5}
  /* Panel */
  .panel{background:#fff;border:1px solid #e4e4e7;border-radius:10px;padding:16px 18px;margin-bottom:16px}
  .panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap}
  .panel-head h3{font-size:14px;font-weight:700;color:#18181b}
  .panel-head .muted{font-size:11.5px;color:#71717a}
  .panel-head .actions{display:flex;gap:8px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .grid-2-35{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-bottom:16px}
  @media (max-width:960px){.grid-2,.grid-2-35{grid-template-columns:1fr}}
  /* Tables */
  .table-wrap{overflow-x:auto;border-radius:8px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  thead th{text-align:left;padding:10px 12px;background:#fafafa;border-bottom:1px solid #e4e4e7;color:#52525b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;position:sticky;top:0}
  tbody td{padding:10px 12px;border-bottom:1px solid #f4f4f5;color:#3f3f46;vertical-align:middle}
  tbody tr:hover td{background:#fafafa}
  tbody tr:last-child td{border-bottom:0}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  td.strong{font-weight:600;color:#18181b}
  /* Pills */
  .pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:600;letter-spacing:0.2px;border:1px solid transparent}
  .pill.a{background:#ecfdf5;color:#047857;border-color:#a7f3d0}
  .pill.b{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
  .pill.c{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
  .pill.ok{background:#ecfdf5;color:#047857;border-color:#a7f3d0}
  .pill.warn{background:#fffbeb;color:#b45309;border-color:#fde68a}
  .pill.bad{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
  .pill.neutral{background:#f4f4f5;color:#52525b;border-color:#e4e4e7}
  .pill.best{background:#fdf4ff;color:#a21caf;border-color:#f5d0fe}
  /* Charts */
  .chart-wrap{position:relative;height:260px}
  .chart-wrap.sm{height:200px}
  .chart-wrap.lg{height:320px}
  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid #e4e4e7;background:#fff;color:#3f3f46;border-radius:7px;font-size:12.5px;cursor:pointer;font-family:inherit;font-weight:500}
  .btn:hover{background:#f4f4f5}
  .btn.primary{background:#18181b;color:#fff;border-color:#18181b}
  .btn.primary:hover{background:#27272a}
  /* Upload */
  .upload-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:16px}
  .upload-slot{background:#fff;border:2px dashed #e4e4e7;border-radius:10px;padding:16px;cursor:pointer;transition:.15s;position:relative}
  .upload-slot:hover{border-color:#a1a1aa;background:#fafafa}
  .upload-slot.has-file{border-style:solid;border-color:#10b981;background:#f0fdf4}
  .upload-slot.dragover{border-color:#18181b;background:#f4f4f5}
  .upload-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
  .upload-slot .u-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .upload-slot .u-title{font-weight:700;font-size:13px;color:#18181b}
  .upload-slot .u-desc{font-size:11.5px;color:#71717a;margin-top:3px;line-height:1.35}
  .upload-slot .u-status{font-size:11.5px;margin-top:8px;color:#10b981;font-weight:600}
  .upload-slot .u-status.empty{color:#a1a1aa;font-weight:500}
  /* Suggestion cards */
  .sug-grid{display:grid;gap:10px}
  .sug-card{display:flex;gap:14px;align-items:flex-start;padding:14px;background:#fff;border:1px solid #e4e4e7;border-radius:10px;border-left:4px solid #e4e4e7}
  .sug-card.act-outlet{border-left-color:#dc2626}
  .sug-card.act-promo{border-left-color:#d97706}
  .sug-card.act-rep{border-left-color:#059669}
  .sug-card.act-prod{border-left-color:#4f46e5}
  .sug-card.act-trf{border-left-color:#8b5cf6}
  .sug-card .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;padding:3px 8px;border-radius:999px;white-space:nowrap;align-self:flex-start}
  .sug-card.act-outlet .badge{background:#fef2f2;color:#b91c1c}
  .sug-card.act-promo .badge{background:#fffbeb;color:#b45309}
  .sug-card.act-rep .badge{background:#ecfdf5;color:#047857}
  .sug-card.act-prod .badge{background:#eef2ff;color:#4338ca}
  .sug-card.act-trf .badge{background:#faf5ff;color:#7e22ce}
  .sug-card .body{flex:1;min-width:0}
  .sug-card .title{font-weight:600;color:#18181b;font-size:13.5px;margin-bottom:3px}
  .sug-card .sub{font-size:12px;color:#71717a}
  .sug-card .reason{margin-top:6px;font-size:12px;color:#3f3f46;background:#fafafa;padding:6px 10px;border-radius:6px;border-left:2px solid #e4e4e7}
  /* Intro banner */
  .intro{background:linear-gradient(135deg,#18181b,#27272a);color:#fff;border-radius:12px;padding:20px 24px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  .intro h2{font-size:17px;font-weight:700;margin-bottom:4px}
  .intro p{font-size:13px;opacity:0.85;max-width:620px}
  .intro .actions{display:flex;gap:8px;flex-shrink:0}
  .intro .btn{background:transparent;border-color:rgba(255,255,255,0.25);color:#fff}
  .intro .btn:hover{background:rgba(255,255,255,0.1)}
  .intro .btn.primary{background:#fff;color:#18181b;border-color:#fff}
  .empty{padding:40px 20px;text-align:center;color:#a1a1aa;font-size:13px}
  /* Search */
  .search{position:relative}
  .search input{padding:6px 10px 6px 28px;border:1px solid #e4e4e7;border-radius:7px;font-size:12.5px;font-family:inherit;outline:none;width:220px}
  .search input:focus{border-color:#18181b}
  .search::before{content:"";position:absolute;left:10px;top:50%;transform:translateY(-50%);width:10px;height:10px;border:1.5px solid #a1a1aa;border-radius:50%}
  /* Toast */
  .toast{position:fixed;bottom:20px;right:20px;background:#18181b;color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;z-index:1000;box-shadow:0 10px 30px rgba(0,0,0,0.15);opacity:0;transform:translateY(10px);transition:.2s}
  .toast.show{opacity:1;transform:translateY(0)}
  .toast.err{background:#dc2626}
  /* Scrollbar */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}
  /* Tabelas ordenáveis */
  table.sortable thead th[data-sort]{user-select:none}
  table.sortable thead th[data-sort]:hover{background:#f4f4f5}
  tbody tr[data-sku]:hover{background:#f4f4f5}
  /* Drawer de detalhe do SKU */
  #sku-drawer{position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;pointer-events:none}
  #sku-drawer .sku-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .2s;pointer-events:none}
  #sku-drawer.open .sku-backdrop{background:rgba(0,0,0,0.35);pointer-events:auto}
  #sku-drawer .sku-panel{position:absolute;top:0;right:0;bottom:0;width:min(520px,94vw);background:#fff;box-shadow:-10px 0 30px rgba(0,0,0,0.12);transform:translateX(100%);transition:transform .25s cubic-bezier(.2,.8,.2,1);overflow-y:auto;pointer-events:auto;padding:24px 26px}
  #sku-drawer.open .sku-panel{transform:translateX(0)}
  .sku-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #e4e4e7}
  .sku-close{background:transparent;border:0;font-size:24px;line-height:1;color:#71717a;cursor:pointer;padding:2px 8px;border-radius:6px}
  .sku-close:hover{background:#f4f4f5;color:#18181b}
  .sku-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .sku-kpi{background:#fafafa;border:1px solid #f4f4f5;border-radius:8px;padding:10px 12px}
  .sku-kpi span{display:block;font-size:10.5px;color:#71717a;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
  .sku-kpi strong{display:block;font-size:17px;font-weight:700;margin-top:4px;color:#18181b}
  .sku-section{margin-bottom:20px}
  .sku-section h3{font-size:12px;text-transform:uppercase;letter-spacing:0.8px;color:#52525b;font-weight:700;margin-bottom:10px}
  .sku-section table{font-size:12.5px}
  .sku-section table thead th{background:#fafafa}
</style>
</head>

<script>
/* ============================================================
 * TVB ESTOQUE INTELIGENTE
 * Regras de negócio co-definidas com Rodrigo (TVB, streetwear).
 * Todas as regras ficam em State.rules e são editáveis na aba "Regras".
 * ============================================================ */

const DEFAULT_RULES = {
  janelaPadrao: 60,          // dias (pode ser trocado no header)
  // TVB usa 50/30/20 (A = 50% da receita, B = 30%, C = 20% resto).
  // Os campos são os CORTES ACUMULADOS: abcA=50 significa "A vai até 50% acumulado"
  abcA: 50, abcB: 80,        // A ≤ 50% acumulado; B 50-80%; C 80-100%
  abcNivel: 'referencia',    // nível da ABC: 'referencia' | 'codVendas' | 'barcode'
  envAlerta: 60,             // dias sem venda -> ALERTA
  envPromo: 90,              // dias sem venda -> PROMOÇÃO
  envQueima: 120,            // dias sem venda -> QUEIMA/OUTLET
  rupturaDiasVenda: 30,      // estoque 0 + vendeu em <= X dias = ruptura real
  cobBaixa: 30,              // cobertura < X dias = baixa
  cobAlta: 60,               // cobertura > X dias = excessiva
  giroAlto: 4,               // giro anualizado >= X = alto
  giroBaixo: 1,              // giro anualizado <= X = baixo
  reabCobertura: 30,         // reabastecer quando cobertura < X
  reabGiroMin: 4,            // ...E giro alto (>=)
  sugestaoTransfAtiva: false // transferência entre lojas desativada por enquanto
};

const State = {
  raw: { estoque: [], vendas: [], produtos: [], ordens: [], devolucoes: [], historico: [] },
  files: { estoque: null, produtos: null, ordens: null, devolucoes: null, vendas: [], historico: [] },
  items: [],          // array unificado (um item por cod+tamanho+empresa+armazenador)
  produtos: [],       // catalog unificado por cod+tamanho
  rules: { ...DEFAULT_RULES },
  filters: { periodo: 60, empresa: 'all', grupo: 'all', tamanho: 'all', armazenador: 'all' },
  currentView: 'overview',
  dataRefDate: null   // data do snapshot de estoque
};

const charts = {};

/* ---------- Utils ---------- */
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const fmtBRL = v => (v==null||isNaN(v)) ? '—' : v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const fmtNum = (v, d=0) => (v==null||isNaN(v)) ? '—' : v.toLocaleString('pt-BR',{maximumFractionDigits:d});
const fmtPct = v => (v==null||isNaN(v)) ? '—' : (v*100).toLocaleString('pt-BR',{maximumFractionDigits:0})+'%';
const toDate = v => {
  if (!v) return null;
  if (v instanceof Date) return v;
  if (typeof v === 'number') { // Excel serial
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    return isNaN(d) ? null : d;
  }
  const d = new Date(v);
  return isNaN(d) ? null : d;
};
const diffDays = (a, b) => a && b ? Math.floor((a - b) / 86400000) : null;
const daysAgo = (d, ref) => diffDays(ref || State.dataRefDate || new Date(), d);
const sum = (arr, fn) => arr.reduce((a,x) => a + (fn ? fn(x) : x) || 0, 0);
const toast = (msg, err=false) => {
  const t = $('#toast'); t.textContent = msg; t.className = 'toast show' + (err?' err':'');
  setTimeout(() => t.classList.remove('show'), 2800);
};
/* Normalize: trim + collapse spaces + lowercase for fuzzy compare */
const norm = s => (s==null?'':String(s)).trim();
const key = s => norm(s).toLowerCase().replace(/\s+/g,' ');

/* Chart helper: destroy before recreate (Chart.js needs this) */
function chart(id, config) {
  const el = document.getElementById(id);
  if (!el) return;
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(el, config);
}

/* ============================================================
 * PARSING — lê arquivos Excel usando SheetJS e normaliza para
 * os nomes de colunas que esperamos (vem direto do PowerBI da TVB).
 * Cada tipo (estoque/vendas/produtos/ordens) tem seu parser.
 * ============================================================ */
function sheetNameLike(wb, candidates) {
  const names = wb.SheetNames;
  for (const c of candidates) {
    const hit = names.find(n => key(n) === key(c));
    if (hit) return hit;
  }
  // fallback: primeiro sheet
  return names[0];
}

function parseSheet(wb, candidates) {
  const name = sheetNameLike(wb, candidates);
  const ws = wb.Sheets[name];
  return XLSX.utils.sheet_to_json(ws, { raw: true, defval: null });
}

async function readFile(file) {
  const buf = await file.arrayBuffer();
  return XLSX.read(buf, { type: 'array', cellDates: true });
}

async function parseEstoque(file) {
  const wb = await readFile(file);
  const rows = parseSheet(wb, ['ESTOQUE','Estoque']);
  return rows.map(r => ({
    empresa: norm(r['Empresa']),
    grupo: norm(r['Grupo (produto acabado)']),
    produto: norm(r['Nome do produto']),
    cor: norm(r['Cor']),
    tamanho: norm(r['Tamanho']),
    qty: +r['Quantidade total disponível'] || 0,
    armazenador: norm(r['Armazenador']),
    barcode: norm(r['Código de barras interno']),
    data: toDate(r['DATA'])
  })).filter(r => r.barcode);
}

async function parseVendas(file) {
  const wb = await readFile(file);
  const rows = parseSheet(wb, ['VENDAS','Vendas']);
  return rows.map(r => ({
    empresa: norm(r['Fantasia (Empresa)']),
    produto: norm(r['Produto']),
    cor: norm(r['Cor']),
    tamanho: norm(r['Tamanho']),
    valor: +r['Valor total líquido'] || 0,
    data: toDate(r['Data da venda']),
    cliente: norm(r['Razão social (Cliente)']),
    qty: +r['Quantidade'] || 0,
    custo: +r['Valor de custo total'] || 0,
    grupo: norm(r['Grupo de produto']),
    tabelaPreco: norm(r['Tabela de preço']),
    vendedor: norm(r['Vendedor']),
    cod: norm(r['cod']),
    cidade: norm(r['Cidade']),
    estado: norm(r['Estado']),
    marca: norm(r['Marca'])
  })).filter(r => r.cod && r.data);
}

async function parseProdutos(file) {
  const wb = await readFile(file);
  const rows = parseSheet(wb, ['Produtos','PRODUTOS']);
  return rows.map(r => ({
    barcode: norm(r['Código de barras interno']),
    grupo: norm(r['Grupo (produto acabado)']),
    referencia: norm(r['Referência']),
    produto: norm(r['Nome do produto']),
    cor: norm(r['Cor']),
    tamanho: norm(r['Tamanho']),
    codVendas: norm(r['cod vendas']),
    bestseller: norm(r['best']).toUpperCase() === 'BESTSELLER'
  })).filter(r => r.barcode);
}

async function parseOrdens(file) {
  const wb = await readFile(file);
  const rows = parseSheet(wb, ['ORDEM DE PRODUÇÃO','Ordem de produção','ORDEM']);
  return rows.map(r => ({
    grupo: norm(r['Grupo de produto acabado']),
    referencia: norm(r['Referência']),
    produto: norm(r['Produto']),
    tamanho: norm(r['Tamanho']),
    qty: +r['Quantidade finalizada'] || 0,
    data: toDate(r['Data de previsão']),
    ordem: norm(r['Ordem de produção']),
    cod: norm(r['COD'])
  })).filter(r => r.cod);
}

async function parseDevolucoes(file) {
  const wb = await readFile(file);
  // aceita variações com/sem espaços no nome da aba
  const rows = parseSheet(wb, ['DEVOLUÇÃO','DEVOLUÇÃO ','DEVOLUCAO','Devoluções','Devolucoes']);
  return rows.map(r => ({
    data: toDate(r['Data da devolução']),
    produto: norm(r['Produto']),
    cor: norm(r['Cor']),
    tamanho: norm(r['Tamanho']),
    qty: +r['Quantidade'] || 0,
    valor: +r['Valor total'] || 0,
    armazenador: norm(r['Armazenador']),
    grupo: norm(r['Grupo de produto']),
    cod: norm(r['Cod ']) || norm(r['Cod']) || norm(r['cod'])
  })).filter(r => r.cod);
}

/* Parser para relatórios históricos agregados por família/mês (Leblon e Rio Sul 2025).
   Esses arquivos vêm do PowerBI com título + filtros no topo — precisa detectar a linha do cabeçalho. */
async function parseHistoricoFamilia(file, lojaPadrao) {
  const wb = await readFile(file);
  const sheetName = wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  // Ler como matriz para encontrar linha do header
  const matrix = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
  let headerRow = -1;
  for (let i = 0; i < Math.min(matrix.length, 15); i++) {
    const row = matrix[i] || [];
    if (row.some(c => c && String(c).includes('Família de Produto')) &&
        row.some(c => c && String(c).includes('Quantidade'))) {
      headerRow = i; break;
    }
  }
  if (headerRow < 0) return [];
  const headers = matrix[headerRow].map(norm);
  const data = [];
  let mesAtual = null;
  for (let i = headerRow + 1; i < matrix.length; i++) {
    const row = matrix[i];
    if (!row || row.every(c => c == null || c === '')) continue;
    const rec = {};
    headers.forEach((h, j) => rec[h] = row[j]);
    // mês pode estar vazio (PowerBI mostra só na 1a linha do grupo)
    if (rec['Data de Emissão.Mês']) mesAtual = norm(rec['Data de Emissão.Mês']);
    const familia = norm(rec['Família de Produto']);
    if (!familia || familia === 'Total Geral') continue;
    data.push({
      loja: lojaPadrao,
      mes: mesAtual,
      familia,
      receita: +rec['Total de Mercadoria'] || 0,
      desconto: +rec['Desconto'] || 0,
      frete: +rec['Frete'] || 0,
      totalNF: +rec['Total da Nota Fiscal'] || 0,
      custo: +rec['CMC Total do Movimento'] || 0,
      quantidade: +rec['Quantidade'] || 0,
      ticketMedio: +rec['Ticket Médio'] || 0
    });
  }
  return data;
}

/* ============================================================
 * JOIN — combina as 4 tabelas em 1 array de "items".
 *
 * Um ITEM é um SKU+Tamanho+Loja. Para cada item calculamos:
 *   - estoque atual
 *   - total produzido (soma de Ordens pro cod+tamanho)
 *   - total vendido (qty + receita + custo)
 *   - vendas em diferentes janelas (30/60/90/180/todo)
 *   - dias desde última venda
 *   - dias desde primeira venda (idade no estoque)
 *   - bestseller flag
 *
 * A partir daí computamos giro, cobertura, sell-through, ABC, etc.
 * ============================================================ */
function computeItems() {
  const { estoque, vendas, produtos, ordens, devolucoes } = State.raw;
  // Data de referência: data do snapshot de estoque (ou hoje)
  const ref = estoque.find(e => e.data)?.data || new Date();
  State.dataRefDate = ref;

  // Index produtos por barcode e por codVendas
  const prodByBarcode = new Map();
  const prodByCod = new Map();
  produtos.forEach(p => {
    if (p.barcode) prodByBarcode.set(p.barcode, p);
    if (p.codVendas) {
      if (!prodByCod.has(p.codVendas)) prodByCod.set(p.codVendas, []);
      prodByCod.get(p.codVendas).push(p);
    }
  });

  // Agregar vendas por (cod, tamanho, empresa) e (cod, tamanho) geral.
  // Também SUBTRAI devoluções do total agregado (mas mantém datas de venda reais
  // pra calcular "última venda" e "dias sem venda").
  const vKey = (cod, tam, emp) => `${cod}||${tam}||${emp||'*'}`;
  const vendasAgg = new Map();
  const vendasTotais = new Map();
  vendas.forEach(v => {
    [vKey(v.cod, v.tamanho, v.empresa), vKey(v.cod, v.tamanho, null)].forEach((k, i) => {
      if (!vendasAgg.has(k)) vendasAgg.set(k, { qty:0, receita:0, custo:0, dates:[], devQty:0, devReceita:0 });
      const a = vendasAgg.get(k);
      a.qty += v.qty; a.receita += v.valor; a.custo += v.custo;
      if (v.data) a.dates.push(v.data);
      if (i===1) vendasTotais.set(k, a);
    });
  });
  // Mapeamento empresa -> armazenador (devoluções vêm com "armazenador", não "empresa")
  const armazenadorParaEmpresa = { 'CD':'TVB Site e Atacado','Leblon':'TVB Leblon','Rio Sul':'TVB Rio Sul' };
  devolucoes.forEach(d => {
    const emp = armazenadorParaEmpresa[d.armazenador] || null;
    [vKey(d.cod, d.tamanho, emp), vKey(d.cod, d.tamanho, null)].forEach(k => {
      if (!vendasAgg.has(k)) vendasAgg.set(k, { qty:0, receita:0, custo:0, dates:[], devQty:0, devReceita:0 });
      const a = vendasAgg.get(k);
      a.qty -= d.qty;
      a.receita -= d.valor;
      a.devQty += d.qty;
      a.devReceita += d.valor;
    });
  });

  // Produção por (cod, tamanho)
  const prodQty = new Map();
  ordens.forEach(o => {
    const k = `${o.cod}||${o.tamanho}`;
    prodQty.set(k, (prodQty.get(k) || 0) + o.qty);
  });

  // Construir items a partir do ESTOQUE (uma linha por barcode+empresa+armazenador)
  const items = estoque.map(e => {
    const prod = prodByBarcode.get(e.barcode) || {};
    const codVendas = prod.codVendas || '';
    const kEmp = vKey(codVendas, e.tamanho, e.empresa);
    const kAll = vKey(codVendas, e.tamanho, null);
    const va = vendasAgg.get(kEmp) || { qty:0, receita:0, custo:0, dates:[] };
    const vaAll = vendasAgg.get(kAll) || { qty:0, receita:0, custo:0, dates:[] };
    const prodTam = prodQty.get(`${codVendas}||${e.tamanho}`) || 0;

    // Janelas de tempo — datas já ordenadas
    const allDates = va.dates.sort((a,b) => a - b);
    const lastSale = allDates[allDates.length-1] || null;
    const firstSale = allDates[0] || null;
    const diasSemVenda = lastSale ? daysAgo(lastSale, ref) : null;
    const diasDesdePrimeira = firstSale ? daysAgo(firstSale, ref) : null;

    // Vendas em janelas específicas (para a loja) — subtrai devoluções
    const vendasJanela = dias => {
      if (dias === 'all') return { qty: va.qty, receita: va.receita, custo: va.custo };
      const cutoff = new Date(ref); cutoff.setDate(cutoff.getDate() - dias);
      let qty=0, rec=0, cus=0;
      vendas.forEach(v => {
        if (v.cod !== codVendas || v.tamanho !== e.tamanho) return;
        if (v.empresa !== e.empresa) return;
        if (v.data < cutoff) return;
        qty += v.qty; rec += v.valor; cus += v.custo;
      });
      // subtrai devoluções da mesma janela
      devolucoes.forEach(d => {
        if (d.cod !== codVendas || d.tamanho !== e.tamanho) return;
        const emp = armazenadorParaEmpresa[d.armazenador];
        if (emp !== e.empresa) return;
        if (!d.data || d.data < cutoff) return;
        qty -= d.qty; rec -= d.valor;
      });
      return { qty: Math.max(0, qty), receita: Math.max(0, rec), custo: cus };
    };

    return {
      // identidade
      barcode: e.barcode,
      codVendas,
      referencia: prod.referencia || '',
      produto: e.produto || prod.produto || '',
      cor: e.cor || prod.cor || '',
      tamanho: e.tamanho,
      grupo: e.grupo || prod.grupo || '',
      empresa: e.empresa,
      armazenador: e.armazenador,
      bestseller: !!prod.bestseller,
      // estoque
      estoque: e.qty,
      // produção (por cod+tamanho, total da rede)
      produzido: prodTam,
      // vendas (para esta loja) — já líquidas de devoluções
      vendasQty: va.qty,
      receita: va.receita,
      custo: va.custo,
      devQty: va.devQty || 0,
      devReceita: va.devReceita || 0,
      vendasTotalQty: vaAll.qty,    // total da rede
      receitaTotal: vaAll.receita,  // total da rede
      lastSale, firstSale, diasSemVenda, diasDesdePrimeira,
      // função dinâmica — recalcula ao trocar a janela
      _vendasJanela: vendasJanela
    };
  });

  State.items = items;
}

/* ---------- Filtros ---------- */
function getFilteredItems() {
  const f = State.filters;
  return State.items.filter(it => {
    if (f.empresa !== 'all' && it.empresa !== f.empresa) return false;
    if (f.grupo !== 'all' && it.grupo !== f.grupo) return false;
    if (f.tamanho !== 'all' && it.tamanho !== f.tamanho) return false;
    if (f.armazenador !== 'all' && it.armazenador !== f.armazenador) return false;
    return true;
  });
}

/* ---------- Métricas por item (dependem da janela) ---------- */
function enrich(items, janela) {
  const dias = janela === 'all' ? 365 : janela; // para anualizar
  return items.map(it => {
    const vj = it._vendasJanela(janela);
    const vendasPeriodo = vj.qty;
    const receitaPeriodo = vj.receita;
    // giro anualizado = (vendas no periodo * 365/dias) / estoque_atual
    const giro = it.estoque > 0 ? (vendasPeriodo * (365 / dias)) / it.estoque : null;
    // cobertura = estoque / (vendas/dia)
    const vendasDia = vendasPeriodo / dias;
    const cobertura = vendasDia > 0 ? it.estoque / vendasDia : (it.estoque > 0 ? Infinity : null);
    // sell-through: vendido / produzido (rede inteira, não por loja — produção é global)
    const sellThrough = it.produzido > 0 ? it.vendasTotalQty / it.produzido : null;
    // envelhecimento = dias sem venda
    const idade = it.diasSemVenda;
    // ruptura: estoque 0 + vendeu nos últimos N dias
    const ruptura = it.estoque === 0 && idade != null && idade <= State.rules.rupturaDiasVenda;
    return { ...it, vendasPeriodo, receitaPeriodo, giro, cobertura, sellThrough, ruptura };
  });
}

/* ---------- Classificações (usam as regras) ---------- */
function classifyEnvelhecimento(idade) {
  const r = State.rules;
  if (idade == null) return 'sem-venda';
  if (idade >= r.envQueima) return 'queima';
  if (idade >= r.envPromo) return 'promo';
  if (idade >= r.envAlerta) return 'alerta';
  return 'ok';
}
function classifyCobertura(cob) {
  const r = State.rules;
  if (cob == null) return 'sem-dados';
  if (cob === Infinity) return 'sem-venda';
  if (cob < r.cobBaixa) return 'baixa';
  if (cob > r.cobAlta) return 'excessiva';
  return 'ok';
}
function classifyGiro(g) {
  const r = State.rules;
  if (g == null) return 'sem-dados';
  if (g >= r.giroAlto) return 'alto';
  if (g <= r.giroBaixo) return 'baixo';
  return 'medio';
}
function classifyABC(enriched) {
  // classifica por receita no período, acumulado.
  // Cada item já deve estar agregado no nível desejado (barcode/codVendas/referencia).
  // Chaveia pelo campo `_key` se existir (setado pela consolidação), senão por barcode.
  const keyOf = it => it._key || it.barcode;
  const sorted = [...enriched].sort((a,b) => (b.receitaPeriodo||0) - (a.receitaPeriodo||0));
  const total = sum(sorted, x => x.receitaPeriodo || 0) || 1;
  let acc = 0;
  const r = State.rules;
  const map = new Map();
  sorted.forEach(it => {
    acc += it.receitaPeriodo || 0;
    const pct = (acc / total) * 100;
    let cls = 'C';
    if (pct <= r.abcA) cls = 'A';
    else if (pct <= r.abcB) cls = 'B';
    map.set(keyOf(it), cls);
  });
  return enriched.map(it => ({ ...it, abc: map.get(keyOf(it)) || 'C' }));
}

/* ============================================================
 * CONSOLIDAÇÃO — agrega items em diferentes níveis:
 *   'loja'       → um por (barcode, empresa, armazenador) (default bruto)
 *   'barcode'    → um por barcode (SKU), somando estoque das 3 lojas
 *   'codVendas'  → um por (cod vendas = modelo+cor), somando tamanhos e lojas
 *   'referencia' → um por referência (modelo), somando tudo
 *
 * Quando há filtro de empresa ativo (≠ 'all'), a consolidação é feita só
 * dentro daquela empresa (mas continua agregando as demais dimensões).
 * ============================================================ */
function consolidate(items, level) {
  if (level === 'loja' || !level) return items;

  const empresaFiltrada = State.filters.empresa !== 'all';

  // agregador genérico — recebe função de chave e de label
  const agg = (keyFn, labelFn) => {
    const groups = new Map();
    items.forEach(it => {
      const k = keyFn(it);
      if (!k) return;
      if (!groups.has(k)) {
        groups.set(k, {
          _key: k,
          referencia: it.referencia,
          produto: it.produto,
          cor: it.cor,
          tamanho: it.tamanho,
          grupo: it.grupo,
          codVendas: it.codVendas,
          barcode: it.barcode,
          empresa: empresaFiltrada ? it.empresa : 'Rede consolidada',
          armazenador: empresaFiltrada ? it.armazenador : 'Rede',
          estoque: 0,
          estoquePorLoja: {},
          produzido: 0,
          vendasQty: 0,
          receita: 0,
          custo: 0,
          devQty: 0,
          devReceita: 0,
          // usado por enrich — soma vendas por janela direto das linhas de origem
          _sourceItems: [],
          _cores: new Set(),
          _tamanhos: new Set(),
          _barcodes: new Set(),
          lastSale: null,
          firstSale: null,
          bestseller: false,
          _label: labelFn ? labelFn(it) : ''
        });
      }
      const g = groups.get(k);
      g.estoque += (it.estoque || 0);
      if (it.armazenador) {
        g.estoquePorLoja[it.armazenador] = (g.estoquePorLoja[it.armazenador]||0) + (it.estoque||0);
      }
      g._sourceItems.push(it);
      if (it.cor) g._cores.add(it.cor);
      if (it.tamanho) g._tamanhos.add(it.tamanho);
      if (it.barcode) g._barcodes.add(it.barcode);
      // produção e vendas-totais-da-rede são por (cod, tamanho) — preservar do primeiro item
      // mas somar quando agregamos por referência (vários tamanhos/cores)
      g.bestseller = g.bestseller || !!it.bestseller;
      if (it.lastSale && (!g.lastSale || it.lastSale > g.lastSale)) g.lastSale = it.lastSale;
      if (it.firstSale && (!g.firstSale || it.firstSale < g.firstSale)) g.firstSale = it.firstSale;
    });

    // Pós-processamento: somar vendas/produção no nível correto, evitando dupla contagem.
    // vendasTotalQty e produzido são por (cod, tamanho) global. Se estamos agregando por
    // barcode (= 1 cod+tamanho), cada _sourceItems tem as 3 lojas do mesmo par → pegamos
    // vendasTotalQty de qualquer um. Se estamos agregando por referência, precisamos somar
    // vendasTotalQty/produzido por (cod, tamanho) único dentro do grupo.
    groups.forEach(g => {
      const pares = new Map(); // (cod, tamanho) → { vendasTotalQty, receitaTotal, produzido, vendasQtyEmpresa, receitaEmpresa, custoEmpresa, devQty, devReceita }
      g._sourceItems.forEach(s => {
        const k2 = `${s.codVendas}||${s.tamanho}`;
        if (!pares.has(k2)) pares.set(k2, {
          vendasTotalQty: s.vendasTotalQty || 0,
          receitaTotal: s.receitaTotal || 0,
          produzido: s.produzido || 0,
          vendasQtyEmpresa: 0, receitaEmpresa: 0, custoEmpresa: 0,
          devQty: 0, devReceita: 0
        });
        const p = pares.get(k2);
        // para empresa específica, somar por linha
        p.vendasQtyEmpresa += (s.vendasQty || 0);
        p.receitaEmpresa += (s.receita || 0);
        p.custoEmpresa += (s.custo || 0);
        p.devQty += (s.devQty || 0);
        p.devReceita += (s.devReceita || 0);
      });
      g.produzido = 0; g.vendasTotalQty = 0; g.receitaTotal = 0;
      g.vendasQty = 0; g.receita = 0; g.custo = 0; g.devQty = 0; g.devReceita = 0;
      pares.forEach(p => {
        g.produzido += p.produzido;
        g.vendasTotalQty += p.vendasTotalQty;
        g.receitaTotal += p.receitaTotal;
        // se filtrou empresa, usar vendasQtyEmpresa; senão, usar total da rede
        if (empresaFiltrada) {
          g.vendasQty += p.vendasQtyEmpresa;
          g.receita += p.receitaEmpresa;
          g.custo += p.custoEmpresa;
          g.devQty += p.devQty;
          g.devReceita += p.devReceita;
        } else {
          g.vendasQty += p.vendasTotalQty;
          g.receita += p.receitaTotal;
          g.custo += p.custoEmpresa;   // custo é por venda, ok somar
          g.devQty += p.devQty;
          g.devReceita += p.devReceita;
        }
      });
      // dias sem venda consolidado
      g.diasSemVenda = g.lastSale ? daysAgo(g.lastSale, State.dataRefDate) : null;
      g.diasDesdePrimeira = g.firstSale ? daysAgo(g.firstSale, State.dataRefDate) : null;

      // Labels amigáveis para cor/tamanho quando agregamos várias variantes
      const cArr = [...g._cores]; const tArr = [...g._tamanhos];
      g.corLabel = cArr.length === 0 ? '—' : cArr.length === 1 ? cArr[0] : `${cArr.length} cores`;
      g.tamanhoLabel = tArr.length === 0 ? '—' : tArr.length === 1 ? tArr[0] : `${tArr.length} tam`;
      g.skuCount = g._barcodes.size;

      // _vendasJanela consolidado — precisa varrer fontes
      g._vendasJanela = (dias) => {
        if (dias === 'all') return { qty: g.vendasQty, receita: g.receita, custo: g.custo };
        // soma das janelas nos source items (já respeita filtro de empresa se ativo)
        let qty=0, rec=0, cus=0;
        g._sourceItems.forEach(s => {
          const j = s._vendasJanela ? s._vendasJanela(dias) : { qty:0, receita:0, custo:0 };
          if (empresaFiltrada) {
            qty += j.qty; rec += j.receita; cus += j.custo;
          } else {
            // quando consolidado na rede, _vendasJanela do source já é da empresa dele;
            // mas queremos toda a rede — somamos as 3 lojas daquele par (cod, tamanho)
            // Para evitar dupla contagem com múltiplas fontes do mesmo par, somamos pelas lojas
            qty += j.qty; rec += j.receita; cus += j.custo;
          }
        });
        return { qty, receita: rec, custo: cus };
      };
    });
    return [...groups.values()];
  };

  if (level === 'barcode')     return agg(it => it.barcode, it => it.produto);
  if (level === 'codVendas')   return agg(it => it.codVendas, it => `${it.produto} ${it.cor||''}`.trim());
  if (level === 'referencia')  return agg(it => it.referencia || it.codVendas, it => it.referencia || it.produto);
  return items;
}

/* Helper: pega items filtrados + consolidados no nível da view.
   Por default consolida por barcode (um por SKU, rede inteira). */
function viewItems(level='barcode') {
  return consolidate(getFilteredItems(), level);
}

/* ============================================================
 * RENDERIZAÇÃO — cada "view" tem sua própria função.
 * O dispatcher `render()` chama a função certa baseado em State.currentView.
 * ============================================================ */
function pill(text, cls) { return `<span class="pill ${cls}">${text}</span>`; }
function truncar(s, n=42) { s = String(s||''); return s.length > n ? s.slice(0,n-1)+'…' : s; }

/* ============================================================
 * INTERATIVIDADE — sortable tables, search, CSV export, drawer
 * ============================================================ */
const _tableSort = {}; // { '#abc-table': { field: 'receitaPeriodo', dir: 'desc' } }

function attachSortable(selector, reRender) {
  const table = document.querySelector(selector); if (!table) return;
  $$('thead th[data-sort]', table).forEach(th => {
    th.style.cursor = 'pointer';
    th.title = 'Clique para ordenar';
    th.onclick = () => {
      const f = th.dataset.sort;
      const cur = _tableSort[selector] || {};
      if (cur.field === f) {
        cur.dir = cur.dir === 'asc' ? 'desc' : 'asc';
      } else {
        cur.field = f; cur.dir = 'desc';
      }
      _tableSort[selector] = cur;
      // update header indicators
      $$('thead th[data-sort]', table).forEach(h => h.innerHTML = h.innerHTML.replace(/\s*[▲▼]\s*$/,''));
      th.innerHTML = th.innerHTML.replace(/\s*[▲▼]\s*$/,'') + (cur.dir==='asc'?' ▲':' ▼');
      reRender && reRender();
    };
  });
}
function applySort(rows, selector) {
  const s = _tableSort[selector]; if (!s || !s.field) return rows;
  const f = s.field, dir = s.dir === 'asc' ? 1 : -1;
  return [...rows].sort((a,b) => {
    const va = a[f], vb = b[f];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'number' || typeof vb === 'number') return (va - vb) * dir;
    return String(va).localeCompare(String(vb), 'pt-BR') * dir;
  });
}
function exportTableCSV(tableId, filename='tabela') {
  const table = document.getElementById(tableId); if (!table) return;
  const rows = [];
  const headers = [...table.querySelectorAll('thead th')].map(th => th.textContent.replace(/[▲▼]/g,'').trim()).filter(Boolean);
  rows.push(headers.join(';'));
  table.querySelectorAll('tbody tr').forEach(tr => {
    const cells = [...tr.querySelectorAll('td')].map(td => {
      // limpa pills e tags, mantém texto
      const txt = td.textContent.trim().replace(/\s+/g,' ');
      // aspas se tem ; ou quebra
      return /[;"\n]/.test(txt) ? `"${txt.replace(/"/g,'""')}"` : txt;
    });
    rows.push(cells.join(';'));
  });
  const blob = new Blob(['\ufeff' + rows.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${filename}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  toast('CSV exportado.');
}
function attachRowClick(tbody) {
  tbody.querySelectorAll('tr[data-sku]').forEach(tr => {
    tr.style.cursor = 'pointer';
    tr.onclick = (e) => {
      // evita clique em selects/inputs dentro
      if (e.target.matches('input,select,button,a')) return;
      openSKUDrawer(tr.dataset.sku);
    };
  });
}

/* Drawer lateral de detalhe do SKU */
function openSKUDrawer(key) {
  // procura item em State.items pelo barcode OU nas listas consolidadas
  const item = State.items.find(i => i.barcode === key) ||
               State.items.find(i => i.codVendas === key) ||
               State.items.find(i => i.referencia === key);
  if (!item) { toast('SKU não encontrado.', true); return; }

  // Reúne TUDO do produto: estoque por loja, vendas por mês, ordens de produção
  const sameBarcode = State.items.filter(i => i.barcode === item.barcode);
  const sameCod = State.items.filter(i => i.codVendas === item.codVendas);
  // Estoque por loja
  const estPorLoja = {};
  sameBarcode.forEach(i => { estPorLoja[i.armazenador] = (estPorLoja[i.armazenador]||0) + i.estoque; });

  // Vendas mensais por loja (últimos 12 meses)
  const ref = State.dataRefDate || new Date();
  const start = new Date(ref); start.setMonth(start.getMonth()-11); start.setDate(1);
  const vendasMes = new Map();
  State.raw.vendas.forEach(v => {
    if (v.cod !== item.codVendas) return;
    if (!v.data || v.data < start) return;
    if (v.tamanho !== item.tamanho) return;
    const k = `${v.data.getFullYear()}-${String(v.data.getMonth()+1).padStart(2,'0')}`;
    if (!vendasMes.has(k)) vendasMes.set(k, {});
    const m = vendasMes.get(k);
    m[v.empresa] = (m[v.empresa]||0) + v.qty;
  });
  const meses = [];
  for (let d = new Date(start); d <= ref; d.setMonth(d.getMonth()+1)) {
    meses.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  const empresasSet = [...new Set(State.items.map(i => i.empresa).filter(Boolean))].sort();

  // Ordens de produção
  const ordens = State.raw.ordens.filter(o => o.cod === item.codVendas && o.tamanho === item.tamanho);
  const totalProduzido = ordens.reduce((a,o) => a + o.qty, 0);
  const totalVendidoRede = sameBarcode[0]?.vendasTotalQty || 0;
  const sellThrough = totalProduzido > 0 ? totalVendidoRede / totalProduzido : null;

  const drawer = document.getElementById('sku-drawer') || (() => {
    const d = document.createElement('div');
    d.id = 'sku-drawer';
    d.innerHTML = `<div class="sku-backdrop"></div><div class="sku-panel"></div>`;
    document.body.appendChild(d);
    d.querySelector('.sku-backdrop').onclick = closeSKUDrawer;
    return d;
  })();

  const lojasEmEstoque = Object.entries(estPorLoja).filter(([,q]) => q>0);
  drawer.querySelector('.sku-panel').innerHTML = `
    <div class="sku-head">
      <div>
        <div style="font-size:11px;color:#71717a;text-transform:uppercase;letter-spacing:0.6px;font-weight:600">${item.referencia||''} · ${item.grupo||''}</div>
        <h2 style="font-size:18px;font-weight:700;margin-top:4px">${item.produto}</h2>
        <div style="color:#71717a;margin-top:4px;font-size:13px">${item.cor||''} · Tamanho ${item.tamanho||''} · SKU ${item.barcode}</div>
        ${item.bestseller ? pill('BESTSELLER','best') : ''}
      </div>
      <button class="sku-close" onclick="closeSKUDrawer()" title="Fechar">×</button>
    </div>

    <div class="sku-kpis">
      <div class="sku-kpi"><span>Estoque rede</span><strong>${fmtNum(sum(sameBarcode, x => x.estoque))}</strong></div>
      <div class="sku-kpi"><span>Vendido 90d (rede)</span><strong>${fmtNum(sum(sameBarcode.map(i=>i._vendasJanela(90)), x => x.qty))}</strong></div>
      <div class="sku-kpi"><span>Produzido total</span><strong>${fmtNum(totalProduzido)}</strong></div>
      <div class="sku-kpi"><span>Sell-through</span><strong>${sellThrough!=null?fmtPct(sellThrough):'—'}</strong></div>
      <div class="sku-kpi"><span>Última venda</span><strong>${item.lastSale?item.lastSale.toLocaleDateString('pt-BR'):'—'}</strong></div>
      <div class="sku-kpi"><span>Dias sem venda</span><strong>${item.diasSemVenda==null?'—':item.diasSemVenda+'d'}</strong></div>
    </div>

    <div class="sku-section">
      <h3>Estoque por local</h3>
      <div class="table-wrap"><table style="width:100%"><thead><tr><th>Local</th><th class="num">Estoque</th></tr></thead>
        <tbody>${lojasEmEstoque.length? lojasEmEstoque.map(([l,q]) => `<tr><td>${l}</td><td class="num strong">${fmtNum(q)}</td></tr>`).join('') : '<tr><td colspan="2" class="empty">Zerado em todas as lojas</td></tr>'}</tbody>
      </table></div>
    </div>

    <div class="sku-section">
      <h3>Vendas últimos 12 meses (por loja)</h3>
      <div class="chart-wrap" style="height:220px"><canvas id="sku-chart"></canvas></div>
    </div>

    ${ordens.length ? `<div class="sku-section">
      <h3>Ordens de produção (${ordens.length})</h3>
      <div class="table-wrap"><table style="width:100%"><thead><tr><th>Ordem</th><th>Prev. entrega</th><th class="num">Qty</th></tr></thead>
        <tbody>${ordens.map(o => `<tr><td>${o.ordem||'—'}</td><td>${o.data?o.data.toLocaleDateString('pt-BR'):'—'}</td><td class="num strong">${fmtNum(o.qty)}</td></tr>`).join('')}</tbody>
      </table></div>
    </div>` : ''}
  `;
  drawer.classList.add('open');
  // gráfico de vendas mensal
  setTimeout(() => {
    const ctx = document.getElementById('sku-chart'); if (!ctx) return;
    const datasets = empresasSet.map((emp, idx) => ({
      label: emp.replace('TVB ',''),
      data: meses.map(m => (vendasMes.get(m) || {})[emp] || 0),
      backgroundColor: ['#18181b','#059669','#4f46e5','#d97706','#dc2626'][idx % 5]
    }));
    if (charts['sku-chart']) charts['sku-chart'].destroy();
    charts['sku-chart'] = new Chart(ctx, {
      type:'bar',
      data:{ labels: meses, datasets },
      options:{ plugins:{ legend:{position:'bottom', labels:{boxWidth:10, font:{size:11}}} },
                responsive:true, maintainAspectRatio:false,
                scales:{ x:{stacked:true}, y:{stacked:true, beginAtZero:true} } }
    });
  }, 30);
}
function closeSKUDrawer() {
  const d = document.getElementById('sku-drawer'); if (d) d.classList.remove('open');
}

function viewOverviewCharts() {
  const items = enrich(viewItems('referencia'), State.filters.periodo);
  // Categoria
  const byCat = {};
  items.forEach(i => { if (!byCat[i.grupo]) byCat[i.grupo] = 0; byCat[i.grupo] += i.receitaPeriodo; });
  const cats = Object.entries(byCat).sort((a,b) => b[1]-a[1]).slice(0,10);
  chart('ovChartCat', {
    type: 'bar',
    data: { labels: cats.map(c => c[0]||'—'), datasets: [{ data: cats.map(c => c[1]), backgroundColor: '#18181b' }] },
    options: { indexAxis:'y', plugins:{ legend:{display:false} }, scales:{ x:{ ticks:{ callback: v => 'R$ '+(v/1000).toFixed(0)+'k' } } } }
  });
  // Vendas por loja últimos 180 dias — linha
  const ref = State.dataRefDate || new Date();
  const end = new Date(ref);
  const start = new Date(ref); start.setDate(start.getDate() - 180);
  const buckets = {}; // dia -> loja -> qty
  State.raw.vendas.forEach(v => {
    if (!v.data || v.data < start || v.data > end) return;
    const d = v.data.toISOString().slice(0,10);
    if (!buckets[d]) buckets[d] = {};
    const emp = v.empresa || '—';
    buckets[d][emp] = (buckets[d][emp] || 0) + v.qty;
  });
  const days = Object.keys(buckets).sort();
  const lojas = [...new Set(State.raw.vendas.map(v => v.empresa))].filter(Boolean);
  const colors = { 'TVB Site e Atacado':'#18181b', 'TVB Leblon':'#059669', 'TVB Rio Sul':'#4f46e5' };
  // Agregar por semana pra ficar mais legível
  const weekly = {};
  days.forEach(d => {
    const dt = new Date(d);
    const wk = new Date(dt); wk.setDate(wk.getDate() - wk.getDay());
    const wkKey = wk.toISOString().slice(0,10);
    if (!weekly[wkKey]) weekly[wkKey] = {};
    Object.entries(buckets[d]).forEach(([l,q]) => weekly[wkKey][l] = (weekly[wkKey][l]||0) + q);
  });
  const wkKeys = Object.keys(weekly).sort();
  chart('ovChartLojas', {
    type: 'line',
    data: {
      labels: wkKeys.map(w => new Date(w).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})),
      datasets: lojas.map(l => ({
        label: l, data: wkKeys.map(w => weekly[w][l] || 0),
        borderColor: colors[l] || '#a1a1aa', backgroundColor: (colors[l] || '#a1a1aa')+'20',
        tension: 0.3, fill: false, borderWidth: 2, pointRadius: 0
      }))
    },
    options: { plugins:{ legend:{ position:'top', align:'end', labels:{ boxWidth:10, boxHeight:10 } } }, scales:{ y:{ title:{display:true,text:'Peças'} } } }
  });
  // Tabela interativa de Top Vendidos
  renderOvTable();
  attachSortable('#ov-top-table', renderOvTable);
  const ovSearch = document.querySelector('[data-ov-search]');
  if (ovSearch) ovSearch.oninput = renderOvTable;
}

/* ============== SELL-THROUGH ============== */
function viewSellThrough() {
  if (!hasData()) return emptyState();
  // Agregamos por REFERÊNCIA (modelo) — uma linha por produto, não por tamanho.
  const items = enrich(viewItems('referencia'), State.filters.periodo).filter(i => i.produzido > 0);
  const computed = items.map(i => ({ ...i, st: i.produzido>0 ? (i.vendasTotalQty / i.produzido) : 0 }));

  const bomST = computed.filter(i => i.st >= 0.8).length;
  const medST = computed.filter(i => i.st >= 0.5 && i.st < 0.8).length;
  const ruimST = computed.filter(i => i.st < 0.5).length;
  const mediaST = computed.length ? computed.reduce((a,i) => a + i.st, 0) / computed.length : 0;
  const totalProd = sum(computed, i => i.produzido);
  const totalVend = sum(computed, i => i.vendasTotalQty);

  const consolidado = State.filters.empresa === 'all';
  State._stAllRows = [...computed].sort((a,b) => a.st - b.st);

  return `
    <div class="intro">
      <div><h2>Sell-through (Vendido ÷ Produzido)</h2>
      <p>Das peças finalizadas na produção, quantas já foram vendidas. Agregado por <strong>referência</strong>. Total: <strong>${fmtNum(totalVend)}/${fmtNum(totalProd)}</strong> = ${fmtPct(totalVend/(totalProd||1))}.</p></div>
    </div>
    <div class="kpi-grid">
      <div class="kpi ok" data-st-filter="alto" style="cursor:pointer"><div class="label">Sell-through alto</div><div class="value">${fmtNum(bomST)}</div><div class="hint">≥ 80%</div></div>
      <div class="kpi warn" data-st-filter="medio" style="cursor:pointer"><div class="label">Médio</div><div class="value">${fmtNum(medST)}</div><div class="hint">50-80%</div></div>
      <div class="kpi bad" data-st-filter="baixo" style="cursor:pointer"><div class="label">Baixo</div><div class="value">${fmtNum(ruimST)}</div><div class="hint">&lt; 50%</div></div>

function viewSellThroughCharts() {
  const items = enrich(viewItems('referencia'), State.filters.periodo).filter(i => i.produzido > 0);

  items.forEach(i => {
    if (!byCat[i.grupo]) byCat[i.grupo] = { prod:0, vend:0 };
    byCat[i.grupo].prod += i.produzido; byCat[i.grupo].vend += i.vendasTotalQty;
  });
  const data = Object.entries(byCat).map(([k,v]) => [k, v.prod>0?v.vend/v.prod:0, v.prod, v.vend]).sort((a,b) => b[1]-a[1]).slice(0,12);
  chart('stCat', {
    type:'bar',
    data:{ labels: data.map(d => d[0]||'—'), datasets:[{ data: data.map(d => d[1]*100), backgroundColor: data.map(d => d[1]>=0.8?'#059669':d[1]>=0.5?'#d97706':'#dc2626') }] },
    options:{ indexAxis:'y', plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx => fmtPct(ctx.parsed.x/100) } } }, scales:{ x:{ title:{display:true, text:'Sell-through %'}, max:100 } } }
  });
  const pts = items.map(i => ({ x: i.produzido, y: i.vendasTotalQty, label: i.produto }));
  chart('stScatter', {
    type:'scatter',
    data:{ datasets:[{ data: pts, backgroundColor: 'rgba(24,24,27,0.35)', pointRadius: 3 }] },

  });
  renderStTable();

  const sel = document.querySelector('[data-st-class]');
  if (sel) sel.onchange = renderStTable;
  const search = document.querySelector('[data-table-search]');
  if (search) search.oninput = renderStTable;
  document.querySelectorAll('[data-st-filter]').forEach(el => {
    el.onclick = () => {
      const s = document.querySelector('[data-st-class]');
      if (s) { s.value = el.getAttribute('data-st-filter'); renderStTable(); }
    };
  });
}
function renderStTable() {
  const tbody = document.getElementById('st-tbody'); if (!tbody) return;
  const sel = document.querySelector('[data-st-class]');
  const q = (document.querySelector('[data-table-search]')?.value || '').toLowerCase().trim();
  let rows = State._stAllRows || [];
  if (sel && sel.value !== 'all') {
    const v = sel.value;
    if (v === 'alto')  rows = rows.filter(i => i.st >= 0.8);
    if (v === 'medio') rows = rows.filter(i => i.st >= 0.5 && i.st < 0.8);
    if (v === 'baixo') rows = rows.filter(i => i.st < 0.5);
  }
  if (q) rows = rows.filter(i =>
    (i.produto||'').toLowerCase().includes(q) ||
    (i.referencia||'').toLowerCase().includes(q)
  );
  rows = applySort(rows, '#st-table');
  tbody.innerHTML = rows.slice(0,500).map(i => {
    const cls = i.st >= 0.8 ? 'alto' : i.st >= 0.5 ? 'medio' : 'baixo';
    const pillCls = cls==='alto'?'ok':cls==='medio'?'warn':'bad';
    return `<tr data-sku="${i.referencia||i._key}">
      <td class="strong">${i.referencia||'—'}</td>
      <td>${truncar(i.produto)}</td>
      <td>${i.corLabel||i.cor||''}</td>
      <td class="num">${fmtNum(i.produzido)}</td>
      <td class="num">${fmtNum(i.vendasTotalQty)}</td>
      <td class="num">${fmtNum(i.estoque)}</td>
      <td class="num">${fmtPct(i.st)}</td>
      <td>${pill(cls.toUpperCase(), pillCls)}${i.bestseller?' '+pill('BEST','best'):''}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" class="empty">Nenhuma referência corresponde</td></tr>';
  attachRowClick(tbody);
}

function viewABCCharts() {
  const level = State.rules.abcNivel || 'referencia';
  const items = enrich(viewItems(level), State.filters.periodo);
  const classified = classifyABC(items);
  const sorted = [...classified].sort((a,b) => (b.receitaPeriodo||0) - (a.receitaPeriodo||0));
  const total = sum(sorted, x => x.receitaPeriodo||0) || 1;

  // Pareto: mostra todos (não só top 150) — o usuário pediu ABC realista
  let acc = 0;
  const points = [];
  sorted.forEach((it, i) => {
    acc += it.receitaPeriodo || 0;
    points.push((acc/total)*100);
    it.pctAcum = (acc/total)*100;  // anota pra usar na tabela
  });
  chart('abcPareto', {
    type:'line',
    data:{ labels: points.map((_,i) => i+1), datasets:[{ data: points, borderColor:'#18181b', fill:true, backgroundColor:'rgba(24,24,27,0.08)', tension:0.2, pointRadius:0 }] },
    options:{
      plugins:{ legend:{display:false},
        annotation:{}, // placeholder
        tooltip:{ callbacks:{ label: ctx => `Top ${ctx.parsed.x}: ${ctx.parsed.y.toFixed(1)}% receita acumulada` } }
      },
      scales:{ x:{ title:{display:true,text:'Top N itens'} }, y:{ title:{display:true,text:'% receita acumulada'}, max:100 } }
    }
  });
  const byClass = { A:0, B:0, C:0 };
  classified.forEach(i => byClass[i.abc] = (byClass[i.abc]||0) + (i.receitaPeriodo||0));
  chart('abcPie', {
    type:'doughnut',
    data:{ labels:['A','B','C'], datasets:[{ data:[byClass.A, byClass.B, byClass.C], backgroundColor:['#059669','#4f46e5','#dc2626'] }] },
    options:{ plugins:{ legend:{position:'bottom'}, tooltip:{ callbacks:{ label: ctx => `${ctx.label}: ${fmtBRL(ctx.parsed)}` } } },
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const cls = ['A','B','C'][elements[0].index];
        const sel = document.querySelector('[data-abc-class]');
        if (sel) { sel.value = cls; sel.dispatchEvent(new Event('change')); }
      }
    }
  });

  // Ao invés de render estático top-100, deixa a tabela reativa.
  renderABCTable(sorted);
  // KPI cards clicáveis filtram tabela
  $$('[data-abc-filter]').forEach(k => k.onclick = () => {
    const sel = document.querySelector('[data-abc-class]');
    if (sel) { sel.value = k.dataset.abcFilter; sel.dispatchEvent(new Event('change')); }
  });
  const classSel = document.querySelector('[data-abc-class]');
  if (classSel) classSel.onchange = () => renderABCTable(sorted);
  const search = document.querySelector('[data-table-search]');
  if (search) search.oninput = () => renderABCTable(sorted);
  attachSortable('#abc-table', () => renderABCTable(sorted));
}

function renderABCTable(sortedAll) {
  const level = State.rules.abcNivel || 'referencia';
  const tbody = document.getElementById('abc-tbody'); if (!tbody) return;
  const classSel = document.querySelector('[data-abc-class]');
  const search = document.querySelector('[data-table-search]');
  const cls = classSel?.value || 'all';

  let rows = sortedAll;
  if (cls !== 'all') rows = rows.filter(i => i.abc === cls);

    <td class="num">${i.pctAcum?i.pctAcum.toFixed(1)+'%':'—'}</td>
    <td>${i.bestseller ? pill('BEST','best') : ''}</td>
  </tr>`).join('');
  tbody.innerHTML = html || `<tr><td colspan="9" class="empty">Nenhum item corresponde ao filtro</td></tr>`;
  attachRowClick(tbody);
}

  const bins = [{lbl:'0-30d',max:30,color:'#059669'},{lbl:'30-60d',max:60,color:'#65a30d'},
                {lbl:`${r.envAlerta}-${r.envPromo}d`,max:r.envPromo,color:'#d97706'},
                {lbl:`${r.envPromo}-${r.envQueima}d`,max:r.envQueima,color:'#ea580c'},
                {lbl:`${r.envQueima}+d`,max:99999,color:'#dc2626'},
                {lbl:'Nunca',max:-1,color:'#71717a'}];
  const counts = new Array(bins.length).fill(0);
  items.forEach(i => {
    const d = i.diasSemVenda;
    if (d == null) { counts[counts.length-1]++; return; }
    for (let j=0; j<bins.length-1; j++) if (d < bins[j].max) { counts[j]++; return; }
  });
  chart('envDist', {
    type:'bar',
    data:{ labels: bins.map(b => b.lbl), datasets:[{ data: counts, backgroundColor: bins.map(b => b.color) }] },
    options:{ plugins:{ legend:{display:false} }, scales:{ y:{ title:{display:true,text:'Nº de SKUs'} } } }
  });
  const byCat = {};
  items.forEach(i => {
    if (i.diasSemVenda == null || i.diasSemVenda < r.envAlerta) return;
    byCat[i.grupo] = (byCat[i.grupo]||0) + 1;
  });
  const data = Object.entries(byCat).sort((a,b) => b[1]-a[1]).slice(0,12);
  chart('envCat', {
    type:'bar',
    data:{ labels: data.map(d => d[0]||'—'), datasets:[{ data: data.map(d => d[1]), backgroundColor:'#dc2626' }] },
    options:{ indexAxis:'y', plugins:{ legend:{display:false} }, scales:{ x:{ title:{display:true,text:'Nº de SKUs encalhados'} } } }
  });
  renderEnvTable();

      <td class="strong">${truncar(i.produto)}</td>
      <td>${i.corLabel||i.cor||''}</td>
      <td>${i.tamanhoLabel||i.tamanho||''}</td>
      ${consolidado?'':`<td>${(i.empresa||'').replace('TVB ','')}</td>`}
      <td class="num">${fmtNum(i.estoque)}</td>
      <td class="num">${i.diasSemVenda!=null ? fmtNum(i.diasSemVenda)+'d' : 'nunca'}</td>
      <td class="num">${i.lastSale ? i.lastSale.toLocaleDateString('pt-BR') : '—'}</td>
      <td>${pill(labelMap[cls], pillCls)}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="${consolidado?7:8}" class="empty">Nenhum SKU corresponde</td></tr>`;
  attachRowClick(tbody);
}

/* ============== RUPTURA ============== */
function viewRuptura() {
  if (!hasData()) return emptyState();
  const r = State.rules;
  const items = enrich(viewItems('referencia'), State.filters.periodo);
  // Classificação ABC pela mesma janela de consolidação — keys casam 1:1
  const classified = classifyABC(items);
  const abcByKey = new Map();
  classified.forEach(c => abcByKey.set(c._key || (c.barcode+'||'+c.empresa+'||'+c.armazenador), c.abc));
  const itemsWithABC = items.map(i => ({ ...i, abc: abcByKey.get(i._key || (i.barcode+'||'+i.empresa+'||'+i.armazenador)) || 'C' }));

  const rupturas = itemsWithABC.filter(i => i.ruptura);
  const esgotadosAntigos = itemsWithABC.filter(i => i.estoque === 0 && (i.diasSemVenda == null || i.diasSemVenda > r.rupturaDiasVenda));
  const preRuptura = itemsWithABC.filter(i => i.estoque > 0 && i.cobertura != null && i.cobertura !== Infinity && i.cobertura < r.cobBaixa && i.giro >= r.giroBaixo);
  const rupturaA = rupturas.filter(i => i.abc === 'A');
  const rupturaBest = rupturas.filter(i => i.bestseller);

  const consolidado = State.filters.empresa === 'all';
  State._rupAllRows = [...rupturas].sort((a,b) => (b.vendasTotalQty||0) - (a.vendasTotalQty||0));
  State._preRupAllRows = [...preRuptura].sort((a,b) => (a.cobertura||999) - (b.cobertura||999));

  return `
    <div class="intro">
      <div><h2>Ruptura de Estoque</h2>
      <p>Regra: estoque = 0 <strong>E</strong> teve venda nos últimos <strong>${r.rupturaDiasVenda} dias</strong>. Isso separa ruptura real de SKU antigo esgotado.</p></div>

      <div class="kpi bad" data-rup-filter="A" style="cursor:pointer"><div class="label">Ruptura Classe A</div><div class="value">${fmtNum(rupturaA.length)}</div><div class="hint">top 50% receita</div></div>
      <div class="kpi warn" data-rup-filter="best" style="cursor:pointer"><div class="label">Ruptura BESTSELLER</div><div class="value">${fmtNum(rupturaBest.length)}</div></div>
      <div class="kpi warn"><div class="label">Pré-ruptura</div><div class="value">${fmtNum(preRuptura.length)}</div><div class="hint">cobertura &lt; ${r.cobBaixa}d e girando</div></div>
      <div class="kpi"><div class="label">Esgotados antigos</div><div class="value">${fmtNum(esgotadosAntigos.length)}</div><div class="hint">provavelmente fora de linha</div></div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <h3>SKUs em ruptura (agir agora)</h3>
        <div class="actions">
          <select data-rup-class style="padding:6px 10px;border:1px solid #e4e4e7;border-radius:7px;font-size:12px">
            <option value="all">Todas</option>
            <option value="A">Só Classe A</option>
            <option value="B">Só Classe B</option>
            <option value="C">Só Classe C</option>
            <option value="best">Só Bestseller</option>
            <option value="urgente">Urgentes (A ou best)</option>
          </select>
          <input type="search" data-rup-search placeholder="Buscar produto/cor..." style="padding:6px 10px;border:1px solid #e4e4e7;border-radius:7px;font-size:12px;min-width:200px">
          <button class="btn" onclick="exportTableCSV('rup-table','rupturas')">↓ CSV</button>
        </div>
      </div>
      <div class="table-wrap" style="max-height:500px;overflow-y:auto">
        <table id="rup-table" class="sortable">
          <thead><tr>
            <th data-sort="produto">Produto</th>
            <th data-sort="cor">Cor</th>
            <th data-sort="tamanho">Tam</th>
            ${consolidado?'':'<th data-sort="empresa">Loja</th>'}
            <th data-sort="abc">ABC</th>
            <th class="num" data-sort="vendasTotalQty">Total vendas</th>
            <th data-sort="lastSale">Última venda</th>
            <th>Urgência</th>
          </tr></thead>

          <input type="search" data-prerup-search placeholder="Buscar produto/cor..." style="padding:6px 10px;border:1px solid #e4e4e7;border-radius:7px;font-size:12px;min-width:200px">

/* ============== SUGESTÕES ============== */
function viewSugestoes() {
  if (!hasData()) return emptyState();
  const r = State.rules;
  const items = enrich(viewItems('referencia'), State.filters.periodo);
  const classified = classifyABC(items);
  const abcByKey = new Map();
  classified.forEach(c => abcByKey.set(c._key || (c.barcode+'||'+c.empresa+'||'+c.armazenador), c.abc));
  const keyOf = it => it._key || (it.barcode+'||'+it.empresa+'||'+it.armazenador);

  const sugestoes = [];
  items.forEach(i => {
    const abc = abcByKey.get(keyOf(i)) || 'C';
    const idade = i.diasSemVenda;
    const empresaLbl = (i.empresa||'').replace('TVB ','') || 'Rede';
    const tituloBase = `${i.produto||''} ${i.cor?('• '+i.cor):''} ${i.tamanho||''}`.trim();
    const skuKey = i.barcode || i._key;
    if (i.estoque > 0 && idade != null && idade >= r.envQueima) {
      sugestoes.push({ acao:'QUEIMA/OUTLET', type:'act-outlet', sku:skuKey, abc,
        titulo:tituloBase, empresa:empresaLbl,
        sub:`${empresaLbl} • Estoque: ${i.estoque} pç`,
        motivo:`Sem venda há ${idade} dias (limite queima = ${r.envQueima}d). Remover da loja e mandar pro outlet.`,
        sort: idade * 1000 });
    } else if (i.estoque > 0 && idade != null && idade >= r.envPromo) {
      sugestoes.push({ acao:'PROMOÇÃO', type:'act-promo', sku:skuKey, abc,
        titulo:tituloBase, empresa:empresaLbl,
        sub:`${empresaLbl} • Estoque: ${i.estoque} pç`,
        motivo:`${idade} dias sem venda. Aplicar desconto pra girar antes de virar queima.`,
        sort: idade * 500 });
    }
    if (i.estoque > 0 && i.cobertura != null && i.cobertura !== Infinity && i.cobertura < r.reabCobertura && i.giro >= r.reabGiroMin) {
      sugestoes.push({ acao:'REABASTECER', type:'act-rep', sku:skuKey, abc,
        titulo:tituloBase, empresa:empresaLbl,
        sub:`${empresaLbl} • Estoque: ${i.estoque} pç • Giro ${fmtNum(i.giro,1)}x`,
        motivo:`Cobertura só ${fmtNum(i.cobertura,1)}d (limite ${r.reabCobertura}d) e giro alto (${fmtNum(i.giro,1)}x ≥ ${r.reabGiroMin}x). Pedir reposição.`,
        sort: 900000 + (i.receitaPeriodo||0) });
    }
    if (i.ruptura) {
      const urgente = i.bestseller || abc === 'A';
      sugestoes.push({ acao: urgente?'RUPTURA URGENTE':'RUPTURA', type:'act-rep', sku:skuKey, abc,
        titulo:tituloBase, empresa:empresaLbl,
        sub:`${empresaLbl} • Vendeu ${fmtNum(i.vendasTotalQty)} pç total`,
        motivo:`Estoque zerado e teve venda nos últimos ${r.rupturaDiasVenda}d. ${urgente?'Classe A ou bestseller — prioridade máxima.':'Reabastecer.'}`,
        sort: 1200000 + (i.vendasTotalQty||0) + (urgente?500000:0) });
    }
    if (i.produzido > 0) {
      const st = i.vendasTotalQty / i.produzido;
      if (st >= 0.85 && i.estoque < i.produzido * 0.1) {
        sugestoes.push({ acao:'PRODUZIR +', type:'act-prod', sku:skuKey, abc,
          titulo:tituloBase, empresa:empresaLbl,
          sub:`Produzido: ${i.produzido} • Vendido: ${i.vendasTotalQty} • Estoque: ${i.estoque}`,
          motivo:`Sell-through de ${fmtPct(st)} e estoque quase esgotado. Produzir próxima leva.`,
          sort: 800000 + i.vendasTotalQty });
      }
    }
  });
  const seen = new Set();
  const unique = sugestoes.filter(s => { const k = s.acao+'|'+s.titulo+'|'+s.sub; if (seen.has(k)) return false; seen.add(k); return true; })
    .sort((a,b) => b.sort - a.sort);
  State._sugAllRows = unique;

  const byAcao = {}; unique.forEach(s => { (byAcao[s.acao] = byAcao[s.acao]||[]).push(s); });
  const ordem = ['RUPTURA URGENTE','RUPTURA','REABASTECER','PRODUZIR +','PROMOÇÃO','QUEIMA/OUTLET'];
  const tipoCls = { 'RUPTURA URGENTE':'bad','RUPTURA':'bad','REABASTECER':'warn','PRODUZIR +':'info','PROMOÇÃO':'warn','QUEIMA/OUTLET':'bad' };
  const kpiCards = ordem.filter(a => byAcao[a]).map(a => {
    const n = byAcao[a].length;
    const cls = tipoCls[a] || 'neutral';
    return `<div class="kpi ${cls}" data-sug-filter="${a}" style="cursor:pointer">
      <div class="label">${a}</div>
      <div class="value">${fmtNum(n)}</div>
      <div class="hint">clique pra filtrar</div>
    </div>`;
  }).join('');

  return `
    <div class="intro">
      <div><h2>Sugestões automáticas</h2>
      <p>Ações geradas a partir das regras que você definiu. <strong>${fmtNum(unique.length)}</strong> sugestões no total. Regras editáveis em <strong>Regras</strong>. Clique num card pra filtrar ou numa linha pra abrir o SKU.</p></div>
    </div>
    ${unique.length === 0 ? '<div class="empty">Nenhuma sugestão — tudo sob controle.</div>' : `
    <div class="kpi-grid">${kpiCards}</div>
    <div class="panel">
      <div class="panel-head">
        <h3>Todas as sugestões</h3>
        <div class="actions">
          <select data-sug-class style="padding:6px 10px;border:1px solid #e4e4e7;border-radius:7px;font-size:12px">
            <option value="all">Todas as ações</option>
            ${ordem.filter(a => byAcao[a]).map(a => `<option value="${a}">${a} (${byAcao[a].length})</option>`).join('')}
          </select>
          <input type="search" data-sug-search placeholder="Buscar produto/cor/loja..." style="padding:6px 10px;border:1px solid #e4e4e7;border-radius:7px;font-size:12px;min-width:220px">
          <button class="btn" onclick="exportTableCSV('sug-table','sugestoes')">↓ CSV</button>
        </div>
      </div>
      <div class="table-wrap" style="max-height:560px;overflow-y:auto">
        <table id="sug-table" class="sortable">
          <thead><tr>
            <th data-sort="acao">Ação</th>
            <th data-sort="titulo">Produto</th>
            <th data-sort="empresa">Loja</th>
            <th data-sort="abc">ABC</th>
            <th>Motivo</th>
          </tr></thead>
          <tbody id="sug-tbody"></tbody>
        </table>
      </div>
    </div>`}`;
}

  if (!document.getElementById('sug-tbody')) return;

/* ============== HISTÓRICO 2025 ============== */
function viewHistorico() {
  const h = State.raw.historico;
  if (!h.length) {
    return `<div class="intro"><div><h2>Histórico 2025</h2>
      <p>Esta aba consome os relatórios agregados do PowerBI (<em>vendas 2025 leblon por familia.xlsx</em>, <em>vendas 2025 rio sul por familia.xlsx</em>). Faça upload na aba <strong>Dados</strong>.</p></div></div>
      <div class="empty">Nenhum dado histórico carregado. Vá para Dados e envie os arquivos por família.</div>`;
  }
  const lojas = [...new Set(h.map(x => x.loja))];
  const meses = [...new Set(h.map(x => x.mes))];
  const familias = [...new Set(h.map(x => x.familia))].sort();
  const totalReceita = sum(h, x => x.receita);
  const totalQtd = sum(h, x => x.quantidade);
  // Pivot família -> mes -> receita (agregando todas as lojas)
  const pivot = {};
  h.forEach(x => {
    pivot[x.familia] = pivot[x.familia] || {};
    pivot[x.familia][x.mes] = (pivot[x.familia][x.mes] || 0) + x.receita;
  });
  // Rows achatadas — uma por família, colunas por mês
  const allRows = familias.map(f => {
    const row = { familia: f, _total: 0 };
    meses.forEach(m => {
      row[m] = pivot[f][m] || 0;
      row._total += row[m];
    });
    return row;
  });
  State._histAllRows = allRows;
  State._histMeses = meses;

  const lojaOpts = ['all', ...lojas].map(l => `<option value="${l}">${l==='all'?'Todas as lojas':l}</option>`).join('');

    </div>
    <div class="panel">
      <div class="panel-head">
        <h3>Receita mensal por categoria (empilhado)</h3>
        <div class="actions">
          <select data-hist-loja style="padding:6px 10px;border:1px solid #e4e4e7;border-radius:7px;font-size:12px">
            ${lojaOpts}
          </select>
        </div>
      </div>
      <div class="chart-wrap lg"><canvas id="histChart"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <h3>Tabela: família × mês (R$)</h3>
        <div class="actions">
          <input type="search" data-hist-search placeholder="Buscar família..." style="padding:6px 10px;border:1px solid #e4e4e7;border-radius:7px;font-size:12px;min-width:200px">
          <button class="btn" onclick="exportTableCSV('hist-table','historico_2025')">↓ CSV</button>
        </div>
      </div>
      <div class="table-wrap" style="max-height:500px;overflow-y:auto">
        <table id="hist-table" class="sortable">
          <thead><tr>
            <th data-sort="familia">Família</th>
            ${meses.map(m => `<th class="num" data-sort="${m}">${m}</th>`).join('')}
